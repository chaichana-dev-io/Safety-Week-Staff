<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STAFF SYSTEM - Safety Week 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root { --navy: #1a237e; --blue: #3b82f6; --bg: #f0f2f5; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #333; -webkit-tap-highlight-color: transparent; }
    .header-section { background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: white; padding: 30px 0 60px; text-align: center; }
    .header-section h5 { font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
    .header-section p { font-size: 0.9rem; opacity: 0.9; margin-bottom: 0; }
    .nav-container { margin-top: -35px; display: flex; justify-content: center; }
    .nav-pills { background: white; padding: 5px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .nav-link { border-radius: 50px !important; color: #555; font-weight: 600; padding: 8px 20px; font-size: 0.95rem; }
    .nav-link.active { background-color: var(--navy) !important; color: white !important; }
    
    /* Grid 3x3 */
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
    .stat-box { 
      background: white; padding: 10px 5px; border-radius: 12px; text-align: center; 
      border-bottom: 4px solid var(--navy); box-shadow: 0 3px 10px rgba(0,0,0,0.06);
      display: flex; flex-direction: column; justify-content: center; min-height: 85px;
    }
    .stat-box .label { 
      font-size: 0.7rem; color: #666; font-weight: 600; line-height: 1.2; margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .stat-box .value { font-size: 1.5rem; font-weight: 800; color: var(--navy); line-height: 1; }

    .main-card { border-radius: 20px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); background: white; margin-top: 10px; }
    .input-custom { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px; font-size: 1.1rem; width: 100%; text-align: center; transition: 0.3s; }
    .input-custom:focus { border-color: var(--blue); outline: none; background: white; }
    .btn-action { border-radius: 12px; padding: 12px; font-weight: 600; border: none; font-size: 1rem; }
    
    .mode-card { cursor: pointer; border: 2px solid #f1f5f9; border-radius: 18px; padding: 12px; background: #fff; transition: 0.2s; }
    .active-checkin { border-color: var(--blue); background: #eff6ff; }
    .active-checkout { border-color: #ef4444; background: #fef2f2; }

    .progress { height: 10px; border-radius: 10px; background-color: #e2e8f0; overflow: hidden; }
    .base-card { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #eee; }
    .base-passed { background-color: #e8f5e9; border-color: #c8e6c9; }
    
    #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(2px); }
    #canvas { width: 100%; border-radius: 12px; display: none; background: #000; transform: scaleX(-1); margin-top: 10px; }

    /* Attendee Card Style for Staff */
    .attendee-card { cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
    .attendee-card:active { transform: scale(0.98); background-color: #f8fafc !important; border-color: var(--blue); }
  </style>
</head>
<body>

<div id="loadingOverlay"><div class="text-center"><div class="spinner-border text-primary mb-2"></div><div class="small fw-bold">กำลังดำเนินการ...</div></div></div>

<div class="header-section">
  <h5>STAFF SYSTEM</h5>
  <p>Safety Week 2026</p>
</div>

<div class="container mb-5">
  <div class="nav-container">
    <ul class="nav nav-pills" id="mainTabs">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tabRec" onclick="resetAll()"><i class="bi bi-qr-code-scan"></i> บันทึก</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tabEdit" onclick="resetEdit()"><i class="bi bi-pencil-square"></i> แก้ไข</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tabMon" onclick="loadMonitorTab()"><i class="bi bi-search"></i> Monitor</button></li>
    </ul>
  </div>

  <div class="tab-content mt-2">
    <div class="tab-pane fade show active" id="tabRec">
      <div class="card main-card p-3 text-center">
        <div class="row g-2 mb-3">
          <div class="col-6"><div id="btnIn" class="mode-card" onclick="setMode('checkin')"><i class="bi bi-box-arrow-in-right fs-3 text-primary"></i><div class="small fw-bold">CHECK-IN</div></div></div>
          <div class="col-6"><div id="btnOut" class="mode-card" onclick="setMode('checkout')"><i class="bi bi-box-arrow-left fs-3 text-danger"></i><div class="small fw-bold">CHECK-OUT</div></div></div>
        </div>
        
        <div id="actionArea" class="d-none">
          <button id="stopCamBtn" class="btn btn-danger w-100 btn-action mb-2 d-none" onclick="stopCamera()"><i class="bi bi-camera-video-off"></i> ปิดกล้องสแกน</button>
          
          <canvas id="canvas"></canvas>
          
          <button id="cameraBtn" class="btn btn-dark w-100 btn-action mb-3 mt-2" onclick="startCamera()"><i class="bi bi-camera"></i> เปิดสแกน QR</button>
          
          <input type="text" id="recordId" class="input-custom mb-3" placeholder="ระบุรหัสพนักงาน" autocomplete="off" onkeydown="handleKey(event, 'record')">
          <button class="btn btn-primary w-100 btn-action shadow" onclick="submitRecord()">ยืนยัน (Enter)</button>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="tabEdit">
      <div class="card main-card p-3">
        <div id="editSearchArea">
          <input type="text" id="editId" class="input-custom mb-3" placeholder="ระบุรหัสพนักงาน" autocomplete="off" onkeydown="handleKey(event, 'searchEdit')">
          <button class="btn btn-primary w-100 btn-action shadow" onclick="searchUserForEdit()">ค้นหา (Enter)</button>
        </div>
        <div id="editForm" class="d-none mt-2">
          <div class="mb-3"><label class="small text-muted fw-bold">ชื่อ-นามสกุล</label><input type="text" id="nameBox" class="form-control"></div>
          <div class="row g-2 mb-3">
            <div class="col-6"><label class="small text-muted fw-bold">แผนก</label><input type="text" id="deptBox" class="form-control"></div>
            <div class="col-6"><label class="small text-muted fw-bold">ฝ่าย</label><input type="text" id="sectBox" class="form-control"></div>
          </div>
          <div class="mb-4"><label class="small text-muted fw-bold">อีเมล</label><input type="email" id="emailBox" class="form-control"></div>
          <div class="row g-2">
            <div class="col-4"><button class="btn btn-light w-100 btn-action border" onclick="resetEdit()">ยกเลิก</button></div>
            <div class="col-8"><button class="btn btn-success w-100 btn-action shadow text-white" onclick="saveEdit()">บันทึก (Enter)</button></div>
          </div>
        </div>
      </div>
    </div>

    <div class="tab-pane fade" id="tabMon">
      <div class="stat-grid" id="statGrid"></div>
      
      <div class="card main-card p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="fw-bold mb-0 text-navy"><i class="bi bi-people-fill"></i> ผู้เข้าร่วม (เช็คอินแล้ว)</h6>
          <span class="badge bg-light text-dark border" id="totalAttendeesBadge">0 คน</span>
        </div>
        
        <input type="text" id="filterInput" class="input-custom mb-3" style="font-size: 0.95rem; padding: 10px;" placeholder="พิมพ์ชื่อ หรือ รหัสพนักงาน..." autocomplete="off" oninput="filterAttendeesList()">
        
        <div id="attendeesList" class="d-flex flex-column gap-2 mb-2">
          </div>
        
        <div id="paginationControls" class="d-flex justify-content-between align-items-center mt-2 pt-2 border-top">
          </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
      <div class="modal-body p-4" id="modalBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// *** API URL เดิมของ Staff System ***
const API_URL = "https://script.google.com/macros/s/AKfycbx_vllXGKpDuUHLLiw3NGXHUL1Mi9KQbrISC3unoVB1ms-rqwQc36m1DTrazKoWY56m9g/exec";
const infoModal = new bootstrap.Modal(document.getElementById('infoModal'));
let video = document.createElement("video");
let canvasElement = document.getElementById("canvas");
let canvas = canvasElement.getContext("2d", { willReadFrequently: true });
let currentMode = null, scanning = false;

// ตัวแปรสำหรับระบบ Pagination หน้า Monitor
let allAttendees = [];
let filteredAttendees = [];
let currentPage = 1;
const itemsPerPage = 20;

const showLoad = (s) => document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none';

function handleKey(e, type) {
  if (e.key === "Enter") {
    if (type === 'record') submitRecord();
    if (type === 'searchEdit') searchUserForEdit();
  }
}

// --- โหลดข้อมูลหน้า Monitor (รายชื่อ + ตาราง 3x3) ---
async function loadMonitorTab() {
  updateStats(); // โหลดตาราง 3x3 เหมือนเดิม
  showLoad(true);
  try {
    // ใช้ฟังก์ชันดึงรายชื่อคนเช็คอินทั้งหมดมาทำเป็น List
    const res = await fetch(`${API_URL}?action=getAllProgress`);
    const r = await res.json();
    if (r.success) {
      allAttendees = r.data;
      document.getElementById('totalAttendeesBadge').innerText = allAttendees.length + " คน";
      document.getElementById('filterInput').value = '';
      filteredAttendees = [...allAttendees];
      currentPage = 1;
      renderAttendeesList();
    }
  } catch(e) { console.error("Error loading monitor:", e); }
  showLoad(false);
}

// --- ค้นหา/กรอง รายชื่อ ---
function filterAttendeesList() {
  const term = document.getElementById('filterInput').value.toLowerCase().trim();
  if(!term) {
    filteredAttendees = [...allAttendees];
  } else {
    filteredAttendees = allAttendees.filter(p => 
      (p.name && p.name.toLowerCase().includes(term)) || 
      (p.empId && p.empId.includes(term))
    );
  }
  currentPage = 1;
  renderAttendeesList();
}

// --- วาดรายการ List หน้า Monitor ---
function renderAttendeesList() {
  const listContainer = document.getElementById('attendeesList');
  const pageControls = document.getElementById('paginationControls');

  if (filteredAttendees.length === 0) {
    listContainer.innerHTML = `<div class="text-center text-muted p-3 border rounded-3 bg-white small">ไม่พบข้อมูลรายชื่อพนักงานที่ Check-in</div>`;
    pageControls.innerHTML = '';
    return;
  }

  const totalPages = Math.ceil(filteredAttendees.length / itemsPerPage);
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  const startIdx = (currentPage - 1) * itemsPerPage;
  const endIdx = startIdx + itemsPerPage;
  const currentData = filteredAttendees.slice(startIdx, endIdx);

  let html = '';
  currentData.forEach(p => {
    const passBadge = p.pass == 9 
      ? `<span class="badge bg-success rounded-pill px-2 py-1"><i class="bi bi-check-circle-fill"></i> จบแล้ว</span>` 
      : `<span class="badge bg-light text-dark border rounded-pill px-2 py-1">${p.pass}/9 ฐาน</span>`;
      
    html += `
      <div class="p-2 border rounded-3 bg-white shadow-sm d-flex justify-content-between align-items-center attendee-card" onclick="viewDetail('${p.empId}')">
        <div>
          <div class="fw-bold text-navy" style="font-size: 0.95rem;">${p.name}</div>
          <div class="small text-muted mt-1">
            <span class="badge bg-secondary rounded-pill fw-normal" style="font-size:0.7rem">ID: ${p.empId}</span>
          </div>
        </div>
        <div class="text-end">
          ${passBadge}
        </div>
      </div>
    `;
  });
  listContainer.innerHTML = html;

  pageControls.innerHTML = `
    <button class="btn btn-sm btn-outline-primary rounded-pill px-3 fw-bold" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>&lt; ก่อนหน้า</button>
    <span class="small fw-bold text-muted">${currentPage} / ${totalPages}</span>
    <button class="btn btn-sm btn-outline-primary rounded-pill px-3 fw-bold" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>ถัดไป &gt;</button>
  `;
}

function changePage(dir) {
  currentPage += dir;
  renderAttendeesList();
}

// --- ดูรายละเอียดรายบุคคล (Popup เดิม) ---
async function viewDetail(empId) {
  if(!empId) return;
  showLoad(true);
  try {
    const res = await fetch(`${API_URL}?action=searchUser&query=${empId}`);
    const r = await res.json();
    showLoad(false);
    
    // แสดงเป็นกลุ่มเหมือนเดิมใน Badge สังกัด แต่ฐานกิจกรรมให้โชว์คำว่า ฐาน
    let displayGroup = (r.group || "ยังไม่เช็คอิน").replace(/Group/g, "กลุ่ม").replace(/ฐาน/g, "กลุ่ม");
    let baseHtml = '';
    for (let i = 0; i < 9; i++) {
      const isPassed = r.details && r.details[i] === "ผ่าน";
      baseHtml += `
        <div class="base-card ${isPassed ? 'base-passed' : ''}">
          <div class="small fw-bold text-navy">ฐานที่ ${i + 1}</div>
          <span>${isPassed ? '<i class="bi bi-check-circle-fill text-success"></i>' : '<i class="bi bi-circle text-muted"></i>'}</span>
        </div>`;
    }

    document.getElementById('modalBody').innerHTML = `
      <div class="text-center mb-3">
        <h6 class="fw-bold mb-1 text-navy">${r.name}</h6>
        <div class="d-flex justify-content-center gap-1 mb-2">
           <span class="badge bg-primary rounded-pill small">ID: ${r.empId}</span>
           <span class="badge bg-secondary rounded-pill small">${displayGroup}</span>
        </div>
      </div>
      <div class="mb-3 px-1">
        <div class="d-flex justify-content-between small mb-1"><b class="text-muted">ความคืบหน้า</b><span class="fw-bold">${r.passedCount}/9 ฐาน</span></div>
        <div class="progress"><div class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width:${(r.passedCount/9)*100}%"></div></div>
      </div>
      <div style="max-height: 280px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px;">${baseHtml}</div>
      <button class="btn btn-navy w-100 text-white rounded-pill mt-3" data-bs-dismiss="modal" style="background:var(--navy)">ปิดหน้าต่าง</button>`;
    infoModal.show();
  } catch(e) { showLoad(false); }
}

// --- ฟังก์ชันอื่นๆ คงเดิม 100% ---
async function submitRecord() {
  const id = document.getElementById('recordId').value.trim();
  if(!id || !currentMode) return;
  showLoad(true);
  const action = currentMode === 'checkin' ? 'confirmCheckIn' : 'checkoutAction';
  try {
    const res = await fetch(`${API_URL}?action=${action}&empId=${id}`);
    const r = await res.json();
    showLoad(false);
    Swal.fire({ icon: r.success?'success':'warning', title: r.success?'สำเร็จ':'แจ้งเตือน', text: r.message, timer: 2500 });
    document.getElementById('recordId').value = ''; 
    updateStats();
  } catch(e) { showLoad(false); }
}

function setMode(m) {
  currentMode = m;
  document.getElementById('btnIn').className = 'mode-card ' + (m==='checkin'?'active-checkin':'');
  document.getElementById('btnOut').className = 'mode-card ' + (m==='checkout'?'active-checkout':'');
  document.getElementById('actionArea').classList.remove('d-none');
  setTimeout(() => document.getElementById('recordId').focus(), 100);
}

function resetAll() {
  stopCamera();
  document.getElementById('actionArea').classList.add('d-none');
  currentMode = null;
  document.getElementById('btnIn').className = 'mode-card';
  document.getElementById('btnOut').className = 'mode-card';
}

function resetEdit() {
  document.getElementById('editSearchArea').classList.remove('d-none');
  document.getElementById('editForm').classList.add('d-none');
  document.getElementById('editId').value = '';
}

async function updateStats() {
  try {
    const res = await fetch(`${API_URL}?action=getBaseMonitor`);
    const r = await res.json();
    if (r.success) {
      document.getElementById('statGrid').innerHTML = r.data.map(i => {
        let shortName = i.baseName.replace("ฐานที่", "กลุ่ม").replace("ฐาน", "กลุ่ม").trim();
        return `<div class="stat-box"><span class="label">${shortName}</span><span class="value">${i.passed}</span></div>`;
      }).join('');
    }
  } catch(e) {}
}

function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
    scanning = true; video.srcObject = stream; video.setAttribute("playsinline", true); video.play();
    canvasElement.style.display = "block"; 
    document.getElementById('cameraBtn').classList.add('d-none');
    document.getElementById('stopCamBtn').classList.remove('d-none');
    requestAnimationFrame(tick);
  });
}

function stopCamera() {
  scanning = false; 
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
  canvasElement.style.display = "none";
  document.getElementById('cameraBtn').classList.remove('d-none');
  document.getElementById('stopCamBtn').classList.add('d-none');
}

function tick() {
  if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
    canvasElement.height = video.videoHeight; canvasElement.width = video.videoWidth;
    canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
    var code = jsQR(canvas.getImageData(0, 0, canvasElement.width, canvasElement.height).data, canvasElement.width, canvasElement.height);
    if (code) { document.getElementById('recordId').value = code.data; stopCamera(); submitRecord(); }
  }
  if(scanning) requestAnimationFrame(tick);
}

async function searchUserForEdit() {
  const id = document.getElementById('editId').value.trim();
  if(!id) return;
  showLoad(true);
  try {
    const res = await fetch(`${API_URL}?action=searchUser&query=${id}`);
    const r = await res.json();
    showLoad(false);
    if(r.success) {
      document.getElementById('nameBox').value = r.name;
      document.getElementById('deptBox').value = r.dept;
      document.getElementById('sectBox').value = r.sect;
      document.getElementById('emailBox').value = r.email;
      document.getElementById('editSearchArea').classList.add('d-none');
      document.getElementById('editForm').classList.remove('d-none');
    }
  } catch(e) { showLoad(false); }
}

async function saveEdit() {
  const id = document.getElementById('editId').value.trim();
  showLoad(true);
  try {
    const res = await fetch(`${API_URL}?action=updateUser&empId=${id}&name=${encodeURIComponent(document.getElementById('nameBox').value)}&dept=${encodeURIComponent(document.getElementById('deptBox').value)}&sect=${encodeURIComponent(document.getElementById('sectBox').value)}&email=${encodeURIComponent(document.getElementById('emailBox').value)}`);
    const r = await res.json();
    showLoad(false);
    if(r.success) { Swal.fire("สำเร็จ", "แก้ไขข้อมูลแล้ว", "success"); resetEdit(); }
  } catch(e) { showLoad(false); }
}

window.onload = updateStats;
</script>
</body>
</html>
